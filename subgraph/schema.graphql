type Collection @entity {
  id: ID!
  name: String
  symbol: String
  wrapper: Currency!
}

type Currency @entity {
  id: ID!
  name: String
  symbol: String
  decimals: Int!
  wrapping: Boolean!
  collection: Collection
  tokenIds: [BigInt!]!
  # derivedETH = price of 1 unit of this currency in ETH (native).
  # Computed from the best available WETH-paired pool; 0 when not derivable.
  derivedETH: BigDecimal!
}

type Pair @entity {
  id: ID!
  discrete0: Boolean!
  discrete1: Boolean!
  token0: Currency!
  token1: Currency!
  reserve0: BigDecimal!
  reserve1: BigDecimal!
  totalSupply: BigDecimal!
  # Aggregates (computed by mappings):
  reserveETH:  BigDecimal!
  reserveUSD:  BigDecimal!
  volumeToken0: BigDecimal!
  volumeToken1: BigDecimal!
  volumeUSD:   BigDecimal!
  txCount:     BigInt!
  isNFTPool:   Boolean!
  createdAtTimestamp:   BigInt!
  createdAtBlockNumber: BigInt!
}

type PairDay @entity {
  id: ID!
  pair: Pair!
  day: Int!
  volume0: BigDecimal!
  volume1: BigDecimal!
  volumeUSD: BigDecimal!
  reserve0: BigDecimal!
  reserve1: BigDecimal!
  reserveUSD: BigDecimal!
  totalSupply: BigDecimal!
  txCount: BigInt!
}

type PairMonth @entity {
  id: ID!
  pair: Pair!
  month: Int!
  volume0: BigDecimal!
  volume1: BigDecimal!
  volumeUSD: BigDecimal!
  reserve0: BigDecimal!
  reserve1: BigDecimal!
  reserveUSD: BigDecimal!
  totalSupply: BigDecimal!
  txCount: BigInt!
}

type Swap @entity(immutable: true) {
  id: ID!
  txId: Bytes!
  origin: Bytes!
  pair: Pair!
  type: String!
  volume0: BigDecimal!
  volume1: BigDecimal!
  volumeUSD: BigDecimal!
  timestamp: Int!
}

# Singleton (id: "1") holding the derived ETH→USD price.
# Updated every time a stablecoin/WETH pool's Sync fires.
type Bundle @entity {
  id: ID!
  ethPrice: BigDecimal!
}

type Counter @entity {
  id: ID!
  value: BigInt!
}
